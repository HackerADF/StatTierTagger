name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Detect Java version from tag
        id: java
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ "$tag" == *"+1.20" || "$tag" == *"+1.20.2" || "$tag" == *"+1.20.3" ]]; then
            echo "version=17" >> "$GITHUB_OUTPUT"
          elif [[ "$tag" == *"+26.1" ]]; then
            echo "version=25" >> "$GITHUB_OUTPUT"
          else
            echo "version=21" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK ${{ steps.java.outputs.version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ steps.java.outputs.version }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: chmod +x gradlew && ./gradlew build

      - name: Collect jars
        run: |
          mkdir -p staging
          find . -path '*/build/libs/*.jar' ! -name '*-dev.jar' ! -name '*-sources.jar' -exec cp {} staging/ \;

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: staging/*.jar
          generate_release_notes: true
