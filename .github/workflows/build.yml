name: Build

on:
  push:
    branches: [main, '1.20', '1.20.2', '1.20.3', '1.20.6', '1.21', '1.21.2', '1.21.4', '1.21.5', '1.21.6', '1.21.9', '1.21.11', '26.1']
  pull_request:
    branches: [main, '1.20', '1.20.2', '1.20.3', '1.20.6', '1.21', '1.21.2', '1.21.4', '1.21.5', '1.21.6', '1.21.9', '1.21.11', '26.1']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect Java version
        id: java
        run: |
          branch="${GITHUB_REF_NAME}"
          if [[ "$branch" == "1.20" || "$branch" == "1.20.2" || "$branch" == "1.20.3" ]]; then
            echo "version=17" >> "$GITHUB_OUTPUT"
          elif [[ "$branch" == "26.1" ]]; then
            echo "version=25" >> "$GITHUB_OUTPUT"
          else
            echo "version=21" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK ${{ steps.java.outputs.version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ steps.java.outputs.version }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: chmod +x gradlew && ./gradlew build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: StatTier-${{ github.ref_name }}-${{ github.run_number }}
          path: |
            build/libs/*.jar
            */build/libs/*.jar
